services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragify-backend
    ports:
      - "9999:9999"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FRONTEND_URL=*
    volumes:
      - ragify_data:/home/user/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragify-frontend
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:9999
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ragify_data:
